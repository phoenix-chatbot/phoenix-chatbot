<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Phoenix Chatbot</title>
    <meta name="google-adsense-account" content="ca-pub-5149547050862927">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5149547050862927"
        crossorigin="anonymous"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f9f9f9;
        }
        #chat-box {
            width: 100%;
            max-width: 600px;
            margin: auto;
            border: 1px solid #ccc;
            padding: 15px;
            background: #fff;
            border-radius: 10px;
        }
        .message {
            margin-bottom: 10px;
        }
        .user {
            color: blue;
        }
        .bot {
            color: green;
        }
        input, button {
            padding: 10px;
            margin-top: 10px;
            width: calc(100% - 24px);
        }
    </style>
</head>
<body>
    <div id="chat-box">
        <h2>Phoenix is online 🔥</h2>
        <div id="messages"></div>
        <input type="text" id="user-input" placeholder="Ask me anything...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById("user-input");
            const message = input.value;
            if (!message) return;

            const messagesDiv = document.getElementById("messages");
            messagesDiv.innerHTML += `<div class="message user"><strong>You:</strong> ${message}</div>`;
            input.value = "";

            fetch("/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ message })
            })
            .then(response => response.json())
            .then(data => {
                messagesDiv.innerHTML += `<div class="message bot"><strong>Phoenix:</strong> ${data.response}</div>`;
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        }
    </script>
</body>
</html>
