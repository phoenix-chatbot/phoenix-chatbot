<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Phoenix Chatbot</title>
    <meta name="google-adsense-account" content="ca-pub-5149547050862927">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5149547050862927"
     crossorigin="anonymous"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: #fff;
            padding: 20px;
        }
        #chatbox {
            width: 100%;
            max-width: 600px;
            margin: auto;
            background: #1f1f1f;
            padding: 20px;
            border-radius: 10px;
        }
        .msg {
            margin-bottom: 10px;
        }
        .user { color: #00f; }
        .bot { color: #0f0; }
        input {
            width: 80%;
            padding: 10px;
            border: none;
            border-radius: 5px;
        }
        button {
            padding: 10px 15px;
            background: #ff5722;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="chatbox">
        <div id="chatlog"></div>
        <input type="text" id="userInput" placeholder="Type your message..." />
        <button onclick="sendMessage()">Send</button>
    </div>

    <!-- AdSense block (invisible but verified) -->
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-5149547050862927"
         data-ad-slot="1234567890"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
    </script>

    <script>
        async function sendMessage() {
            const input = document.getElementById("userInput");
            const msg = input.value;
            if (!msg) return;

            // Show user message
            const chatlog = document.getElementById("chatlog");
            chatlog.innerHTML += `<div class="msg user"><b>You:</b> ${msg}</div>`;

            // Send to Flask
            const res = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: msg })
            });
            const data = await res.json();

            // Show bot reply
            chatlog.innerHTML += `<div class="msg bot"><b>Phoenix:</b> ${data.reply}</div>`;
            input.value = "";
        }
    </script>
</body>
</html>
